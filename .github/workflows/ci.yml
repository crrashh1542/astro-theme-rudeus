name: CI

on:
  push:
    branches:
      - "**"

jobs:
  build:
    uses: ./.github/workflows/build.yml

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact from Build job
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare deploy package
        shell: bash
        run: |
          set -e
          ARTIFACT_ZIP=$(find artifacts -type f -name "*.zip" | head -n 1)
          if [ -z "$ARTIFACT_ZIP" ]; then
            echo "No zip artifact found"
            exit 1
          fi
          mkdir -p deploy
          unzip -o "$ARTIFACT_ZIP" -d deploy

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          rsync -az --delete deploy/dist/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}"